# image-forge configuration — every field is optional; delete what you don't need.
#
# Location: ~/.config/image-forge/config.toml
#   (honors $XDG_CONFIG_HOME and $IMAGE_FORGE_CONFIG).
# Copy this file to that location and edit.

# Model used by `gen` when -m / --model-path is omitted.
default_model = "animagine-xl-4"

# Default output path for `gen` when -o is omitted.
output = "out.png"

# Allow pulling / using questionable- or explicit-rated models without --allow-nsfw.
allow_nsfw = false

# Directory for pulled model files (checkpoints, VAEs, upscalers — the multi-GB
# part). Point it at a bigger disk if you're low on space. "~" is expanded; also
# settable via $IMAGE_FORGE_MODELS_DIR. This affects NEW pulls — already-installed
# models keep the absolute paths recorded in the registry (move them and re-pull,
# or `models rm` + re-pull, to relocate). Default: <data-dir>/models.
# models_dir = "/Volumes/BigDisk/image-forge/models"

# API tokens for gated / authenticated downloads. PREFER the environment variables
# HF_TOKEN / CIVITAI_TOKEN — they take precedence; these are only a fallback.
# Never commit real tokens.
# hf_token = "hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# civitai_token = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# hires.fix defaults. `gen --hires auto` (the default) follows the model profile;
# `on`/`off` force it. When hires runs, this picks the upscaler:
#   "latent"  — built-in, no model download (fast, default fallback)
#   "auto"    — a downloaded ESRGAN upscaler if one is installed, else latent
#   "lanczos" / "nearest" — other built-ins
#   "<name>"  — a specific installed upscaler model (see `models list`)
# CLI --hires-upscaler / --hires-model and the model profile override this.
[hires]
upscaler = "auto"

# ESRGAN model used when a model is needed but not named — the `upscale` command
# without --model, and hires with an ESRGAN upscaler and no explicit model.
[upscaler]
# default_model = "realesrgan-x4-anime"
